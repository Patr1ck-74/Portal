name: Build Debug Apks

on:
  workflow_dispatch: # 允许你在网页上手动点击运行

jobs:
  build:
    name: Build Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 关键步骤 1：缓存签名文件，保证每次打包 SHA1 不变
      - name: Cache Debug Keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-${{ github.repository }}

      # 关键步骤 2：如果缓存不存在，则生成一个标准的测试签名
      - name: Ensure Debug Keystore Exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      # 关键步骤 3：在控制台打印出 SHA1 指纹，供你复制到百度地图平台
      - name: Print Debug SHA1 Fingerprint
        run: |
          echo "========================================="
          echo "你的百度地图 SHA1 指纹是："
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:"
          echo "========================================="

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Portal-Debug-APKs
          path: app/build/outputs/apk/*/debug/*.apk
